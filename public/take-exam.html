<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Take your exam — answer questions within the time limit.">
  <title>Exam Platform — Take Exam</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <!-- Exam Header -->
  <div class="exam-header-bar">
    <div class="container">
      <div>
        <h3 id="examTitle" style="font-size: 1rem;">Loading...</h3>
        <div class="progress-bar-container" style="width: 300px;">
          <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 20px;">
        <div id="answeredCount" style="font-size: 0.85rem; color: var(--text-muted);">0/0 answered</div>
        <div class="timer" id="timer">
          ⏱ <span id="timerDisplay">00:00</span>
        </div>
        <button class="btn btn-primary btn-sm" onclick="confirmSubmit()">Submit Exam</button>
      </div>
    </div>
  </div>

  <!-- Questions -->
  <div class="container" style="padding-top: 24px; padding-bottom: 48px;">
    <div id="questionsContainer">
      <div class="spinner"></div>
    </div>

    <div style="text-align: center; margin-top: 32px;">
      <button class="btn btn-primary btn-lg" onclick="confirmSubmit()" id="submitBtn">
        Submit Exam
      </button>
    </div>
  </div>

  <!-- Confirm Submit Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal" style="max-width: 420px;">
      <div class="modal-header">
        <h2>⚠️ Submit Exam?</h2>
        <button class="modal-close" onclick="closeConfirmModal()">✕</button>
      </div>
      <div class="modal-body" style="text-align: center;">
        <p style="color: var(--text-secondary); margin-bottom: 12px;">
          You have answered <strong id="confirmAnswered">0</strong> out of <strong id="confirmTotal">0</strong> questions.
        </p>
        <p style="color: var(--text-muted); font-size: 0.85rem;">
          Once submitted, you cannot retake this exam.
        </p>
      </div>
      <div class="modal-footer" style="justify-content: center;">
        <button class="btn btn-ghost" onclick="closeConfirmModal()">Continue Exam</button>
        <button class="btn btn-primary" onclick="submitExam()">Submit Now</button>
      </div>
    </div>
  </div>

  <!-- Result Modal -->
  <div class="modal-overlay" id="resultModal">
    <div class="modal" style="max-width: 500px;">
      <div class="modal-body" style="text-align: center; padding: 40px;">
        <div id="resultContent"></div>
      </div>
      <div class="modal-footer" style="justify-content: center;">
        <button class="btn btn-primary" onclick="goToDashboard()">Back to Dashboard</button>
      </div>
    </div>
  </div>

  <script src="/js/take-exam.js"></script>
</body>
</html>
