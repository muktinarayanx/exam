<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Exam Platform — Conduct online exams seamlessly. Examiners create tests, students take them, results delivered instantly.">
  <title>Exam Platform — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">📝</div>
        <h1>Welcome Back</h1>
        <p>Sign in to your Exam Platform account</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div style="position: relative;">
            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required style="padding-right: 40px;">
            <button type="button" style="position: absolute; right: 0; top: 0; height: 100%; border: none; background: transparent; padding: 0 12px; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; display: flex; align-items: center;" onclick="togglePassword('loginPassword', this)" title="Show/Hide Password">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
